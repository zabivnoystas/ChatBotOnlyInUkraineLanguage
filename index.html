<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат із ботом</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="message-area">

            <div class="chat">
                <div class="message bot">Привіт, я бот ти можеш спілкуватися зі мною</div>
            </div>

            <input placeholder="Напиши щось" type="text" class="userInput">
            <button class="send">Відправити</button>
        </div>
    </div>



    <script src="app.js"></script>
</body>
</html>
